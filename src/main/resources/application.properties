server.port=8080

# ===============================
# DATABASE
# ===============================

spring.datasource.url=jdbc:mysql://localhost:3306/ecommerce_db?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true

spring.datasource.username=root

spring.datasource.password=YOUR_MYSQL_PASSWORD

spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver


# ===============================
# JPA / HIBERNATE
# ===============================

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect


# ===============================
# JWT
# ===============================

app.jwt.secret=myVerySecretJwtKeyForSpringBootApplication123456

app.jwt.expiration=86400000


# ===============================
# MAIL CONFIG
# ===============================

spring.mail.host=smtp.gmail.com
spring.mail.port=587

spring.mail.username=YOUR_GMAIL@gmail.com

spring.mail.password=YOUR_GOOGLE_APP_PASSWORD

spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true


# ===============================
# RAZORPAY
# ===============================

razorpay.api.key=YOUR_RAZORPAY_KEY

razorpay.api.secret=YOUR_RAZORPAY_SECRET


# ===============================
# CORS
# ===============================

app.cors.allowed-origins=http://localhost:3000,http://localhost:4200